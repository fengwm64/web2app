name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # 支持手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read config.properties
        id: cfg
        run: |
          source <(grep -v '^#' config.properties | sed 's/ *= */=/g')
          echo "app_name=${APP_NAME}"     >> $GITHUB_OUTPUT
          echo "version_name=${VERSION_NAME}" >> $GITHUB_OUTPUT

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── 有签名 Secrets → 构建 Release APK ──────────────────────────────────
      - name: Decode keystore (if secret exists)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.jks

      - name: Build Release APK (signed)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_PATH:      ${{ github.workspace }}/release.jks
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS:          ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:       ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload Release APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.cfg.outputs.app_name }}-v${{ steps.cfg.outputs.version_name }}-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      # ── 没有 Secrets → 构建 Debug APK ──────────────────────────────────────
      - name: Build Debug APK (unsigned)
        if: ${{ secrets.KEYSTORE_BASE64 == '' }}
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK
        if: ${{ secrets.KEYSTORE_BASE64 == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.cfg.outputs.app_name }}-v${{ steps.cfg.outputs.version_name }}-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
