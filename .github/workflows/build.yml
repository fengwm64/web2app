name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HAS_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read config.properties
        id: cfg
        run: |
          APP_NAME=$(grep '^APP_NAME=' config.properties | cut -d'=' -f2-)
          VERSION_NAME=$(grep '^VERSION_NAME=' config.properties | cut -d'=' -f2-)
          echo "app_name=${APP_NAME}"         >> $GITHUB_OUTPUT
          echo "version_name=${VERSION_NAME}" >> $GITHUB_OUTPUT

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew generate_icons.sh

      - name: Install ImageMagick
        if: hashFiles('logo.png') != ''
        run: sudo apt-get install -y imagemagick

      - name: Generate launcher icons from logo.png
        if: hashFiles('logo.png') != ''
        run: ./generate_icons.sh

      # ── 有签名 Secrets → 构建 Release APK ──────────────────────────────────
      - name: Decode keystore
        if: env.HAS_KEYSTORE == 'true'
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.jks

      - name: Build Release APK (signed)
        if: env.HAS_KEYSTORE == 'true'
        env:
          KEYSTORE_PATH:      ${{ github.workspace }}/release.jks
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS:          ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:       ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload Release APK
        if: env.HAS_KEYSTORE == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.cfg.outputs.app_name }}-v${{ steps.cfg.outputs.version_name }}-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      # ── 没有 Secrets → 构建 Debug APK ──────────────────────────────────────
      - name: Build Debug APK (unsigned)
        if: env.HAS_KEYSTORE == 'false'
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK
        if: env.HAS_KEYSTORE == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.cfg.outputs.app_name }}-v${{ steps.cfg.outputs.version_name }}-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
