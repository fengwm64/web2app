# ============================================================
#  Web2App 配置文件 — 只需修改这里，推送后 GitHub Actions 自动构建 APK
# ============================================================

# 目标网址（必填）
TARGET_URL=https://www.yaozhineng.com/

# 应用名称（显示在桌面的名字）
APP_NAME=药智能

# 包名（全局唯一，建议改成自己的域名反写，例如 com.mycompany.myapp）
APP_ID=com.yaozhineng.www

# 版本号（每次发布需要递增 VERSION_CODE）
VERSION_CODE=1
VERSION_NAME=1.0

# 启动页副标题（留空则不显示）
SPLASH_TAGLINE=药智能 · 成药性优化智能体

# 初始缩放比例（100 = 默认，90 = 缩小到90%）
INITIAL_SCALE=90

# 图标背景色（当 logo 有透明背景时生效）
ICON_BG_COLOR=#ffffff

# 图标来源（二选一）：
#   方式一：将 logo.png 放到项目根目录
#   方式二：填写图片 URL（支持 PNG/JPG/SVG，优先级低于本地 logo.png）
LOGO_URL=https://img.102465.xyz/file/H2i3MFTO.png
